# Command: quarto render your_notebook.ipynb --to html
# Command for rendering plotly : quarto render your_notebook.ipynb --execute


format:
  html:
    self-contained: true
    toc: false
    toc-location: left
    number-sections: true
    page-layout: full
    highlight-style: atom-one
    code-tools: true
    code-block-bg: true
    code-block-border-left: "#31BAE9"
    code-line-numbers: true
    code-fold: true
    code-overflow: scroll
    code-summary: "Show the code"

