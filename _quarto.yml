  # - text: |
  #     <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  - text: |
      <style>
        /* Enable scrolling for long cell output */
        pre, code, .sourceCode, .cell-code, .code-tools .sourceCode, .code-fold .sourceCode {
          max-height: 400px;  /* Set max height before scrolling */
          overflow: auto;  /* Enable vertical scrolling */
          # border: 1px solid #ddd; /* Optional: add a border */
          # padding: 8px;
          # background-color: #f6f8fa; /* Light gray like Jupyter */
          white-space: pre-wrap;
          font-family: monospace;
        }

        /* Ensure table output inside cells can scroll */
        div.output_area {
          max-height: 400px;
          overflow-y: auto;
        }
        
        # pre:hover, .sourceCode:hover, .cell-code:hover {
