  - text: |
      <style>
        /* Format table */
        table {
          border-collapse: collapse;
          width: 100%;
          font-family: Arial, sans-serif;
          font-size: 14px;
          border-radius: 6px;
          overflow: hidden;
        }

        /* Remove table borders */
        table, th, td {
          border: none;
        }

        /* Add zebra striping (alternating row colors) */
        tbody tr:nth-child(odd) {
          background-color: #f7f7f7; /* Light gray, like Jupyter */
        }
        
        /* Keep table headers bold and slightly darker */
        thead th {
          background-color: #eaeaea;
          font-weight: bold;
          text-align: left;
          padding: 8px;
        }

        /* Add padding to table cells */
        td, th {
          padding: 8px;
          text-align: left;
        }

        /* Highlight row on hover */
        tbody tr:hover {
          # background-color: #e2e2e2 !important;
          background-color: #dff6ff !important;  /* Light blue */
        }

        /* Make index column stand out (for DataFrames with an index) */
        tbody tr td:first-child {
          font-weight: bold;
          color: #333;
        }
      </style>